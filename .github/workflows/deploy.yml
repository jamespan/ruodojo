name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          destination: ./_site

      - name: Generate clean markdown files
        run: |
          mkdir -p /tmp/md
          for file in _posts/*.md; do
            filename=$(basename "$file")
            slug=$(echo "$filename" | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}-(.+)\.md$/\1/')
            title=$(awk '/^---$/{n++; next} n==1 && /^title:/{sub(/^title: *["'"'"']?/, ""); sub(/["'"'"']$/, ""); print; exit}' "$file")
            {
              echo "# ${title}"
              echo ""
              awk '/^---$/{n++; next} n>=2' "$file"
            } > "/tmp/md/${slug}.md"
          done
          sudo cp -r /tmp/md _site/md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
